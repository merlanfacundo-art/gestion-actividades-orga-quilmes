<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Actividades</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --celeste: #74ACDF; --blanco: #F4F4F4; --gris: #2a2a2a;
    --gris-medio: #3d3d3d; --gris-claro: #5a5a5a;
    --acento: #e8c547; --verde: #4caf7d; --rojo: #e05555; --naranja: #e07a30; --texto: #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--gris); font-family: 'IBM Plex Sans', sans-serif; color: var(--blanco); min-height: 100vh; }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--gris);
  }
  .auth-box {
    width: 380px; max-width: 95vw;
    border-top: 4px solid var(--acento);
    background: var(--gris-medio);
    padding: 32px;
  }
  .auth-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--acento); margin-bottom: 4px; }
  .auth-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gris-claro); margin-bottom: 28px; }
  .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid var(--gris-claro); }
  .auth-tab { flex: 1; padding: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-align: center; color: var(--gris-claro); border: none; background: transparent; transition: all 0.15s; }
  .auth-tab.active { color: var(--acento); border-bottom: 2px solid var(--acento); margin-bottom: -1px; }
  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .auth-form input {
    background: rgba(0,0,0,0.3); border: 1px solid var(--gris-claro);
    color: var(--blanco); padding: 10px 12px;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem; width: 100%;
  }
  .auth-form input:focus { outline: none; border-color: var(--celeste); }
  .auth-form input::placeholder { color: var(--gris-claro); }
  .auth-btn {
    background: var(--acento); color: var(--texto); border: none;
    padding: 11px; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
    letter-spacing: 2px; cursor: pointer; transition: all 0.15s; margin-top: 4px;
  }
  .auth-btn:hover { background: white; }
  .auth-error { background: rgba(224,85,85,0.15); border-left: 3px solid var(--rojo); padding: 8px 12px; font-size: 0.8rem; color: #f99; display: none; }
  .auth-error.visible { display: block; }

  /* ── APP ── */
  #app-screen { display: none; }

  header { background: var(--celeste); border-bottom: 4px solid var(--acento); }
  .header-inner { display: flex; align-items: stretch; }
  .header-flag { display: flex; flex-direction: column; width: 10px; flex-shrink: 0; }
  .flag-stripe { flex: 1; }
  .flag-stripe.celeste { background: var(--celeste); }
  .flag-stripe.blanco { background: white; }
  .header-content { padding: 14px 20px; flex: 1; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .header-titles { flex: 1; }
  .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--texto); letter-spacing: 2px; line-height: 1; }
  .app-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--gris); letter-spacing: 3px; text-transform: uppercase; margin-top: 3px; opacity: 0.7; }

  .user-chip { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; background: rgba(0,0,0,0.15); padding: 5px 12px; color: var(--texto); display: flex; align-items: center; gap: 8px; }
  .user-chip .name { font-weight: 600; }

  .sync-indicator { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 1px; padding: 5px 10px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.12); color: var(--texto); white-space: nowrap; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gris-claro); transition: background 0.3s; }
  .sync-dot.conectado { background: var(--verde); }
  .sync-dot.sincronizando { background: var(--acento); animation: pulso 0.8s infinite; }
  .sync-dot.error { background: var(--rojo); }
  @keyframes pulso { 0%,100%{opacity:1}50%{opacity:0.3} }

  .btn { background: var(--acento); color: var(--texto); border: none; padding: 8px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }
  .btn:hover { background: white; }
  .btn.secondary { background: transparent; color: var(--blanco); border: 1px solid var(--gris-claro); }
  .btn.secondary:hover { border-color: var(--blanco); }
  .btn.danger { background: var(--rojo); color: white; }
  .btn.danger:hover { background: #c04040; }
  .btn.small { padding: 4px 10px; font-size: 0.65rem; }
  .btn.ghost { background: transparent; color: var(--gris-claro); border: 1px solid var(--gris-claro); }
  .btn.ghost:hover { color: var(--blanco); border-color: var(--blanco); }

  .nav-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--gris-claro); margin-bottom: 20px; }
  .nav-tab { padding: 10px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; color: var(--gris-claro); border: none; background: transparent; transition: all 0.15s; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .nav-tab.active { color: var(--acento); border-bottom-color: var(--acento); }
  .nav-tab:hover:not(.active) { color: var(--blanco); }

  .main { padding: 20px; max-width: 900px; margin: 0 auto; }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px; color: var(--acento); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--gris-claro); }

  .actividades-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .actividades-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

  .actividad-card { background: var(--gris-medio); border-left: 4px solid var(--gris-claro); cursor: pointer; transition: all 0.15s; overflow: hidden; }
  .actividad-card:hover { border-left-color: var(--celeste); }
  .actividad-card.selected { border-left-color: var(--acento); background: #464646; }
  .actividad-card-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .actividad-nombre { flex: 1; font-weight: 600; font-size: 0.95rem; }
  .tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; background: rgba(0,0,0,0.3); padding: 2px 8px; color: var(--gris-claro); }
  .tag.zona { color: var(--celeste); }
  .actividad-fecha { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--celeste); }
  .pct { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; }
  .progress-bar-wrap { height: 3px; background: rgba(0,0,0,0.3); }
  .progress-bar-fill { height: 100%; transition: width 0.4s ease; }

  .detalle-panel { background: var(--gris-medio); padding: 20px; margin-bottom: 24px; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)} }
  .detalle-nombre-edit { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--gris-claro); flex-wrap: wrap; }
  .detalle-nombre-edit input, .detalle-nombre-edit select { background: rgba(0,0,0,0.3); border: 1px solid var(--gris-claro); color: var(--blanco); padding: 6px 10px; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem; }
  .detalle-nombre-edit input { flex: 1; min-width: 140px; }
  .detalle-nombre-edit input[type="date"] { flex: 0; min-width: 140px; }

  .areas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .areas-grid { grid-template-columns: 1fr; } }

  .area-block { background: rgba(0,0,0,0.2); padding: 14px; }
  .area-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .area-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .tarea-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .tarea-label { flex: 1; font-size: 0.8rem; color: #ccc; }
  .estado-btn { width: 28px; height: 28px; border: none; cursor: pointer; font-size: 0.75rem; font-weight: bold; border-radius: 2px; transition: all 0.1s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .estado-btn.pendiente { background: rgba(255,255,255,0.1); color: #aaa; }
  .estado-btn.pendiente:hover { background: rgba(255,255,255,0.2); }
  .estado-btn.ok { background: var(--verde); color: white; }
  .estado-btn.na { background: var(--gris-claro); color: white; font-size: 0.6rem; }
  .estado-btn.problema { background: var(--rojo); color: white; }

  .tarea-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; color: var(--gris-claro); margin-left: 120px; margin-bottom: 2px; }
  .tarea-nota { background: rgba(0,0,0,0.25); border: none; border-bottom: 1px solid var(--gris-claro); color: #bbb; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; padding: 3px 6px; margin-bottom: 8px; margin-left: 120px; width: calc(100% - 120px); }
  .tarea-nota:focus { outline: none; border-bottom-color: var(--celeste); color: white; }

  /* ── ADMIN PANEL ── */
  .admin-section { margin-bottom: 32px; }
  .admin-section h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--acento); margin-bottom: 14px; }

  .invite-generator { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .invite-generator input { background: rgba(0,0,0,0.3); border: 1px solid var(--gris-claro); color: var(--blanco); padding: 8px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; flex: 1; min-width: 200px; }

  .invite-list { display: flex; flex-direction: column; gap: 6px; }
  .invite-row { background: var(--gris-medio); padding: 10px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .invite-code { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--acento); letter-spacing: 2px; flex: 1; }
  .invite-note { font-size: 0.75rem; color: var(--gris-claro); flex: 1; }
  .invite-status { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 1px; padding: 2px 8px; }
  .invite-status.disponible { background: rgba(76,175,125,0.2); color: var(--verde); }
  .invite-status.usado { background: rgba(90,90,90,0.3); color: var(--gris-claro); }

  .usuarios-list { display: flex; flex-direction: column; gap: 6px; }
  .usuario-row { background: var(--gris-medio); padding: 10px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .usuario-nombre { flex: 1; font-weight: 600; font-size: 0.85rem; }
  .usuario-email { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--gris-claro); flex: 1; }
  .usuario-rol { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 1px; padding: 2px 8px; }
  .usuario-rol.admin { background: rgba(232,197,71,0.2); color: var(--acento); }
  .usuario-rol.militante { background: rgba(116,172,223,0.2); color: var(--celeste); }

  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-chip { background: rgba(0,0,0,0.3); padding: 6px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
  .stat-chip .val { font-size: 1rem; font-weight: 600; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--gris-claro); }
  .empty-state .big { font-size: 2rem; margin-bottom: 8px; }
  .empty-state p { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; letter-spacing: 1px; }
  .loading { text-align: center; padding: 40px; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--gris-claro); letter-spacing: 2px; }

  .color-prensa { color: var(--celeste); } .dot-prensa { background: var(--celeste); }
  .color-construccion { color: var(--acento); } .dot-construccion { background: var(--acento); }
  .color-organizacion { color: var(--verde); } .dot-organizacion { background: var(--verde); }
  .color-finanzas { color: var(--naranja); } .dot-finanzas { background: var(--naranja); }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--gris-medio); padding: 24px; width: 420px; max-width: 95vw; border-top: 3px solid var(--acento); }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 16px; color: var(--acento); }
  .form-field { margin-bottom: 12px; }
  .form-field label { display: block; font-size: 0.65rem; font-family: 'IBM Plex Mono', monospace; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
  .form-field input, .form-field select { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--gris-claro); color: var(--blanco); padding: 8px 10px; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem; }
  .form-field select option { background: #3d3d3d; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.3); border-top-color: var(--texto); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Mala Junta</div>
    <div class="auth-sub">Panel organizativo · Gestión de actividades</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Ingresar</button>
      <button class="auth-tab" onclick="switchTab('registro')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login" class="auth-form">
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-pass" placeholder="Contraseña">
      <div class="auth-error" id="login-error"></div>
      <button class="auth-btn" onclick="doLogin()">Ingresar</button>
    </div>

    <!-- REGISTRO -->
    <div id="tab-registro" class="auth-form" style="display:none">
      <input type="text" id="reg-nombre" placeholder="Nombre completo">
      <input type="email" id="reg-email" placeholder="Email">
      <input type="password" id="reg-pass" placeholder="Contraseña (mín. 6 caracteres)">
      <input type="text" id="reg-codigo" placeholder="Código de invitación" style="letter-spacing:3px;text-transform:uppercase">
      <div class="auth-error" id="reg-error"></div>
      <button class="auth-btn" onclick="doRegistro()">Crear cuenta</button>
    </div>
  </div>
</div>

<!-- ══ APP SCREEN ══ -->
<div id="app-screen">
  <header>
    <div class="header-inner">
      <div class="header-flag">
        <div class="flag-stripe celeste"></div>
        <div class="flag-stripe blanco"></div>
        <div class="flag-stripe celeste"></div>
      </div>
      <div class="header-content">
        <div class="header-titles">
          <div class="app-title">Gestión de Actividades</div>
          <div class="app-subtitle">Panel organizativo</div>
        </div>
        <div class="user-chip">
          <span class="name" id="header-nombre"></span>
          <span id="header-rol" style="opacity:0.6"></span>
        </div>
        <div class="sync-indicator">
          <div class="sync-dot" id="sync-dot"></div>
          <span id="sync-label">Conectando...</span>
        </div>
        <button class="btn ghost small" onclick="doLogout()">Salir</button>
      </div>
    </div>
  </header>

  <div class="main">
    <div class="nav-tabs" id="nav-tabs">
      <button class="nav-tab active" onclick="showTab('actividades')">Actividades</button>
      <button class="nav-tab admin-only" onclick="showTab('admin')" style="display:none">Admin</button>
    </div>

    <!-- TAB ACTIVIDADES -->
    <div id="tab-actividades">
      <div id="stats-bar" class="stats-bar"></div>
      <div class="actividades-header">
        <div class="section-title" style="margin:0;flex:1">Actividades</div>
        <button class="btn" onclick="abrirModal()">+ Nueva actividad</button>
      </div>
      <div class="actividades-list" id="actividades-list"><div class="loading">Cargando...</div></div>
      <div id="detalle-panel" style="display:none"></div>
    </div>

    <!-- TAB ADMIN -->
    <div id="tab-admin" style="display:none">
      <div class="admin-section">
        <h3>Generar código de invitación</h3>
        <div class="invite-generator">
          <input type="text" id="invite-nota" placeholder="Nota (ej: para Juan Pérez)">
          <button class="btn" onclick="generarCodigo()">Generar código</button>
        </div>
        <div class="invite-list" id="invite-list"><div class="loading">Cargando...</div></div>
      </div>
      <div class="admin-section">
        <h3>Militantes registrados</h3>
        <div class="usuarios-list" id="usuarios-list"><div class="loading">Cargando...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal nueva actividad -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h3>Nueva Actividad</h3>
    <div class="form-field"><label>Nombre</label><input type="text" id="m-nombre" placeholder="Ej: Jornada de salud barrial"></div>
    <div class="form-field"><label>Tipo</label>
      <select id="m-tipo"><option>Política</option><option>Cultural</option><option>Salud</option><option>Educativa</option><option>Solidaria</option><option>Género</option></select>
    </div>
    <div class="form-field"><label>Fecha</label><input type="date" id="m-fecha"></div>
    <div class="form-field"><label>Zona / Espacio</label><input type="text" id="m-zona" placeholder="Ej: Sede central"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn" onclick="crearActividad()">Crear</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, onValue, set, update, remove, push, get }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAvUpbVMGtPt9CdToy5rhYWuxY2ZWAgO0U",
  authDomain: "gestion-actividades-orga.firebaseapp.com",
  databaseURL: "https://gestion-actividades-orga-default-rtdb.firebaseio.com",
  projectId: "gestion-actividades-orga",
  storageBucket: "gestion-actividades-orga.firebasestorage.app",
  messagingSenderId: "108373642172",
  appId: "1:108373642172:web:13d537e2da0f76664fb9b9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ── ÁREAS ──────────────────────────────────────────────────────────
const AREAS = {
  prensa: { label: 'Prensa', color: 'prensa', tareas: [
    { id: 'difusion', label: 'Difusión' },
    { id: 'flyer_redes', label: 'Flyer redes' },
    { id: 'flyer_volanteada', label: 'Flyer volanteada' },
    { id: 'cobertura', label: 'Cobertura' },
    { id: 'publicacion_posterior', label: 'Publicación posterior' },
  ]},
  construccion: { label: 'Construcción', color: 'construccion', tareas: [
    { id: 'convocatoria_contactxs', label: '¿Se convoca a contactxs?' },
    { id: 'participacion_tareas', label: '¿Contactxs participan en tareas?' },
  ]},
  organizacion: { label: 'Organización', color: 'organizacion', tareas: [
    { id: 'esquema_seguridad', label: 'Esquema de seguridad' },
    { id: 'intervenciones', label: 'Intervenciones' },
    { id: 'convocatoria_zonal', label: 'Convocatoria zonal' },
    { id: 'espacio_mesas', label: 'Espacio – Mesas' },
    { id: 'espacio_sillas', label: 'Espacio – Sillas' },
    { id: 'espacio_sonido', label: 'Espacio – Sonido' },
    { id: 'espacio_proyeccion', label: 'Espacio – Proyección' },
    { id: 'espacio_escenario', label: 'Espacio – Escenario' },
    { id: 'estructura', label: 'Estructura / Ambientación' },
    { id: 'cronograma', label: 'Cronograma' },
    { id: 'tareas_roles', label: 'Asignación de roles/turnos' },
  ]},
  finanzas: { label: 'Finanzas', color: 'finanzas', tareas: [
    { id: 'bebida', label: 'Bebida' },
    { id: 'comida', label: 'Comida' },
    { id: 'materiales', label: 'Materiales propios' },
    { id: 'manteles', label: 'Manteles' },
    { id: 'decoracion', label: 'Decoración' },
    { id: 'luces', label: 'Luces' },
    { id: 'pantallas', label: 'Pantallas' },
  ]}
};

const ESTADOS = ['pendiente', 'ok', 'na', 'problema'];
const ESTADO_ICONS = { pendiente: '–', ok: '✓', na: 'N/A', problema: '!' };

let actividades = {};
let seleccionada = null;
let currentUser = null;
let currentUserData = null;

// ── HELPERS ────────────────────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  label.textContent = { conectado: 'En línea', sincronizando: 'Guardando...', error: 'Sin conexión' }[state] || 'Conectando...';
}

function crearEstadoInicial() {
  const estado = {};
  for (const [areaId, area] of Object.entries(AREAS)) {
    estado[areaId] = {};
    for (const t of area.tareas) estado[areaId][t.id] = { estado: 'pendiente', nota: '', quien: '', cuando: '' };
  }
  return estado;
}

function calcularProgreso(act) {
  let total = 0, hechas = 0;
  for (const [areaId, area] of Object.entries(AREAS)) {
    for (const t of area.tareas) {
      total++;
      const e = act.estado?.[areaId]?.[t.id]?.estado;
      if (e === 'ok' || e === 'na') hechas++;
    }
  }
  return Math.round((hechas / total) * 100);
}

function formatFecha(f) {
  if (!f) return '';
  const [y, m, d] = f.split('-');
  return `${d}/${m}/${y}`;
}

function formatTs(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' }) + ' ' +
    d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

function generarCodigoAleatorio() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 8; i++) {
    if (i === 4) code += '-';
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

// ── AUTH TABS ──────────────────────────────────────────────────────
window.switchTab = function(tab) {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('tab-registro').style.display = tab === 'registro' ? 'flex' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'registro'));
  });
};

// ── LOGIN ──────────────────────────────────────────────────────────
window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('visible');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = {
      'auth/invalid-credential': 'Email o contraseña incorrectos.',
      'auth/user-not-found': 'No existe una cuenta con ese email.',
      'auth/wrong-password': 'Contraseña incorrecta.',
      'auth/invalid-email': 'Email inválido.',
    };
    errEl.textContent = msgs[e.code] || 'Error al ingresar. Intentá de nuevo.';
    errEl.classList.add('visible');
  }
};

// ── REGISTRO ───────────────────────────────────────────────────────
window.doRegistro = async function() {
  const nombre = document.getElementById('reg-nombre').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const codigo = document.getElementById('reg-codigo').value.trim().toUpperCase().replace(/\s/g,'');
  const errEl = document.getElementById('reg-error');
  errEl.classList.remove('visible');

  if (!nombre || !email || !pass || !codigo) {
    errEl.textContent = 'Completá todos los campos.'; errEl.classList.add('visible'); return;
  }
  if (pass.length < 6) {
    errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'; errEl.classList.add('visible'); return;
  }

  // Verificar código
  try {
    const invSnap = await get(ref(db, `invitaciones/${codigo}`));
    if (!invSnap.exists()) {
      errEl.textContent = 'Código de invitación inválido.'; errEl.classList.add('visible'); return;
    }
    const inv = invSnap.val();
    if (inv.usado) {
      errEl.textContent = 'Este código ya fue utilizado.'; errEl.classList.add('visible'); return;
    }

    // Crear usuario
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;

    // Verificar si es el primer usuario (se convierte en admin)
    const usersSnap = await get(ref(db, 'usuarios'));
    const esAdmin = !usersSnap.exists() || Object.keys(usersSnap.val() || {}).length === 0;

    // Guardar perfil
    await set(ref(db, `usuarios/${uid}`), {
      nombre, email, rol: esAdmin ? 'admin' : 'militante', creadoEn: Date.now()
    });

    // Marcar código como usado
    await update(ref(db, `invitaciones/${codigo}`), { usado: true, usadoPor: nombre, usadoEn: Date.now() });

  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Ya existe una cuenta con ese email.',
      'auth/invalid-email': 'Email inválido.',
      'auth/weak-password': 'La contraseña es muy débil.',
    };
    errEl.textContent = msgs[e.code] || 'Error al registrarse. Intentá de nuevo.';
    errEl.classList.add('visible');
  }
};

// ── LOGOUT ─────────────────────────────────────────────────────────
window.doLogout = async function() {
  await signOut(auth);
};

// ── AUTH STATE ─────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    // Cargar datos del usuario
    const snap = await get(ref(db, `usuarios/${user.uid}`));
    if (snap.exists()) {
      currentUserData = snap.val();
      document.getElementById('header-nombre').textContent = currentUserData.nombre;
      document.getElementById('header-rol').textContent = currentUserData.rol === 'admin' ? '· Admin' : '';
      if (currentUserData.rol === 'admin') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
      }
    }
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    iniciarApp();
  } else {
    currentUser = null;
    currentUserData = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

// ── APP INIT ───────────────────────────────────────────────────────
function iniciarApp() {
  onValue(ref(db, 'actividades'), (snapshot) => {
    actividades = snapshot.val() || {};
    setSyncState('conectado');
    render();
    if (seleccionada) {
      if (actividades[seleccionada]) { renderDetalle(); document.getElementById('detalle-panel').style.display = 'block'; }
      else { seleccionada = null; document.getElementById('detalle-panel').style.display = 'none'; }
    }
  }, () => setSyncState('error'));
}

// ── NAV TABS ───────────────────────────────────────────────────────
window.showTab = function(tab) {
  document.getElementById('tab-actividades').style.display = tab === 'actividades' ? 'block' : 'none';
  document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'admin') cargarAdmin();
};

// ── ADMIN ──────────────────────────────────────────────────────────
async function cargarAdmin() {
  // Invitaciones
  const invSnap = await get(ref(db, 'invitaciones'));
  const invs = invSnap.val() || {};
  const invEl = document.getElementById('invite-list');
  const invKeys = Object.keys(invs);
  if (invKeys.length === 0) {
    invEl.innerHTML = '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:0.75rem;color:var(--gris-claro);padding:10px">No hay códigos generados todavía.</div>';
  } else {
    invEl.innerHTML = invKeys.reverse().map(code => {
      const inv = invs[code];
      return `
        <div class="invite-row">
          <span class="invite-code">${code}</span>
          <span class="invite-note">${inv.nota || ''}</span>
          <span class="invite-status ${inv.usado ? 'usado' : 'disponible'}">${inv.usado ? `Usado · ${inv.usadoPor || ''}` : 'Disponible'}</span>
          ${!inv.usado ? `<button class="btn danger small" onclick="revocarCodigo('${code}')">Revocar</button>` : ''}
        </div>
      `;
    }).join('');
  }

  // Usuarios
  const usersSnap = await get(ref(db, 'usuarios'));
  const users = usersSnap.val() || {};
  const usersEl = document.getElementById('usuarios-list');
  const userKeys = Object.keys(users);
  if (userKeys.length === 0) {
    usersEl.innerHTML = '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:0.75rem;color:var(--gris-claro);padding:10px">No hay militantes registrados.</div>';
  } else {
    usersEl.innerHTML = userKeys.map(uid => {
      const u = users[uid];
      return `
        <div class="usuario-row">
          <span class="usuario-nombre">${u.nombre}</span>
          <span class="usuario-email">${u.email}</span>
          <span class="usuario-rol ${u.rol}">${u.rol}</span>
          ${u.rol !== 'admin' ? `<button class="btn small secondary" onclick="cambiarRol('${uid}','admin')">Hacer admin</button>` : ''}
        </div>
      `;
    }).join('');
  }
}

window.generarCodigo = async function() {
  const nota = document.getElementById('invite-nota').value.trim();
  const codigo = generarCodigoAleatorio();
  await set(ref(db, `invitaciones/${codigo}`), {
    nota, creadoPor: currentUserData?.nombre || '', creadoEn: Date.now(), usado: false
  });
  document.getElementById('invite-nota').value = '';
  cargarAdmin();
};

window.revocarCodigo = async function(codigo) {
  if (!confirm(`¿Revocar el código ${codigo}?`)) return;
  await remove(ref(db, `invitaciones/${codigo}`));
  cargarAdmin();
};

window.cambiarRol = async function(uid, rol) {
  await update(ref(db, `usuarios/${uid}`), { rol });
  cargarAdmin();
};

// ── RENDER ─────────────────────────────────────────────────────────
function renderStats() {
  const ids = Object.keys(actividades);
  const total = ids.length;
  const completadas = ids.filter(id => calcularProgreso(actividades[id]) === 100).length;
  const enCurso = ids.filter(id => { const p = calcularProgreso(actividades[id]); return p > 0 && p < 100; }).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-chip"><span class="val">${total}</span>&nbsp;actividades</div>
    <div class="stat-chip"><span class="val" style="color:var(--verde)">${completadas}</span>&nbsp;completas</div>
    <div class="stat-chip"><span class="val" style="color:var(--acento)">${enCurso}</span>&nbsp;en curso</div>
  `;
}

function renderLista() {
  const el = document.getElementById('actividades-list');
  const ids = Object.keys(actividades);
  if (ids.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="big">🏴</div><p>Todavía no hay actividades.<br>Creá la primera con el botón de arriba.</p></div>`;
    return;
  }
  ids.sort((a, b) => (actividades[a].fecha || '') < (actividades[b].fecha || '') ? -1 : 1);
  el.innerHTML = ids.map(id => {
    const act = actividades[id];
    const prog = calcularProgreso(act);
    const sel = seleccionada === id ? 'selected' : '';
    const pctColor = prog === 100 ? 'var(--verde)' : prog > 0 ? 'var(--acento)' : 'var(--gris-claro)';
    const barColor = prog === 100 ? 'var(--verde)' : prog > 50 ? 'var(--acento)' : 'var(--celeste)';
    return `
      <div class="actividad-card ${sel}" onclick="seleccionar('${id}')">
        <div class="actividad-card-header">
          <div class="actividad-nombre">${act.nombre}</div>
          <span class="tag">${act.tipo}</span>
          ${act.fecha ? `<span class="actividad-fecha">${formatFecha(act.fecha)}</span>` : ''}
          ${act.zona ? `<span class="tag zona">${act.zona}</span>` : ''}
          <span class="pct" style="color:${pctColor}">${prog}%</span>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${prog}%;background:${barColor}"></div></div>
      </div>
    `;
  }).join('');
}

function renderDetalle() {
  if (!seleccionada || !actividades[seleccionada]) return;
  const act = actividades[seleccionada];
  const panel = document.getElementById('detalle-panel');
  const areasHTML = Object.entries(AREAS).map(([areaId, area]) => {
    const tareasHTML = area.tareas.map(t => {
      const td = act.estado?.[areaId]?.[t.id] || { estado: 'pendiente', nota: '', quien: '', cuando: '' };
      const e = td.estado;
      const btns = ESTADOS.map(st =>
        `<button class="estado-btn ${st}" onclick="toggleEstado('${seleccionada}','${areaId}','${t.id}','${st}')"
          title="${st}" style="${e!==st?'opacity:0.3':''}">${ESTADO_ICONS[st]}</button>`
      ).join('');
      const meta = td.quien ? `<div class="tarea-meta">${td.quien} · ${formatTs(td.cuando)}</div>` : '';
      return `
        <div class="tarea-row">${btns}<span class="tarea-label">${t.label}</span></div>
        ${meta}
        <input class="tarea-nota" type="text" placeholder="nota..." value="${td.nota||''}"
          onchange="guardarNota('${seleccionada}','${areaId}','${t.id}',this.value)">
      `;
    }).join('');
    return `
      <div class="area-block">
        <div class="area-title color-${area.color}"><div class="area-dot dot-${area.color}"></div>${area.label}</div>
        ${tareasHTML}
      </div>
    `;
  }).join('');

  panel.innerHTML = `
    <div class="detalle-panel">
      <div class="detalle-nombre-edit">
        <input type="text" value="${act.nombre}" onchange="editarCampo('${seleccionada}','nombre',this.value)" style="flex:2">
        <select onchange="editarCampo('${seleccionada}','tipo',this.value)">
          ${['Política','Cultural','Salud','Educativa','Solidaria','Género'].map(t=>`<option ${act.tipo===t?'selected':''}>${t}</option>`).join('')}
        </select>
        <input type="date" value="${act.fecha||''}" onchange="editarCampo('${seleccionada}','fecha',this.value)">
        <input type="text" placeholder="Zona" value="${act.zona||''}" onchange="editarCampo('${seleccionada}','zona',this.value)" style="flex:1">
        <button class="btn danger small" onclick="eliminarActividad('${seleccionada}')">Eliminar</button>
      </div>
      <div class="areas-grid">${areasHTML}</div>
    </div>
  `;
}

function render() { renderStats(); renderLista(); }

// ── ACCIONES ───────────────────────────────────────────────────────
window.seleccionar = function(id) {
  if (seleccionada === id) { seleccionada = null; document.getElementById('detalle-panel').style.display = 'none'; }
  else { seleccionada = id; renderDetalle(); document.getElementById('detalle-panel').style.display = 'block'; }
  renderLista();
};

window.toggleEstado = function(actId, areaId, tareaId, estado) {
  setSyncState('sincronizando');
  update(ref(db, `actividades/${actId}/estado/${areaId}/${tareaId}`), {
    estado, quien: currentUserData?.nombre || 'Anónimx', cuando: Date.now()
  }).then(() => setSyncState('conectado')).catch(() => setSyncState('error'));
};

window.guardarNota = function(actId, areaId, tareaId, nota) {
  setSyncState('sincronizando');
  update(ref(db, `actividades/${actId}/estado/${areaId}/${tareaId}`), { nota })
    .then(() => setSyncState('conectado')).catch(() => setSyncState('error'));
};

window.editarCampo = function(actId, campo, valor) {
  setSyncState('sincronizando');
  update(ref(db, `actividades/${actId}`), { [campo]: valor })
    .then(() => setSyncState('conectado')).catch(() => setSyncState('error'));
};

window.eliminarActividad = function(id) {
  if (!confirm(`¿Eliminar "${actividades[id]?.nombre}"?`)) return;
  setSyncState('sincronizando');
  remove(ref(db, `actividades/${id}`))
    .then(() => { setSyncState('conectado'); seleccionada = null; document.getElementById('detalle-panel').style.display = 'none'; })
    .catch(() => setSyncState('error'));
};

window.abrirModal = function() {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('m-fecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('m-nombre').value = '';
  document.getElementById('m-zona').value = '';
};

window.cerrarModal = function() { document.getElementById('modal').style.display = 'none'; };

window.crearActividad = function() {
  const nombre = document.getElementById('m-nombre').value.trim();
  if (!nombre) { alert('Poné un nombre para la actividad'); return; }
  const nueva = {
    nombre, tipo: document.getElementById('m-tipo').value,
    fecha: document.getElementById('m-fecha').value,
    zona: document.getElementById('m-zona').value.trim(),
    creadoPor: currentUserData?.nombre || '', creadoEn: Date.now(),
    estado: crearEstadoInicial()
  };
  setSyncState('sincronizando');
  const newRef = push(ref(db, 'actividades'));
  set(newRef, nueva)
    .then(() => { setSyncState('conectado'); cerrarModal(); seleccionada = newRef.key; })
    .catch(() => setSyncState('error'));
};

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) cerrarModal(); });

// Enter en login
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
</script>
</body>
